<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ITS Construct</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --brand-main: #0A1C30;
            --bg-dark: #050505;
            --border-subtle: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #E5E5E5;
            overflow: hidden;
        }

        .login-card {
            background: rgba(10, 28, 48, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: #FFFFFF;
            background: rgba(255, 255, 255, 0.06);
            outline: none;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .text-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, #A3A3A3 100%);
            -webkit-background-clip: text;
            -webkit-fill-color: transparent;
        }

        /* Ambient background glow */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(10, 28, 48, 0.4) 0%, rgba(5, 5, 5, 0) 70%);
            z-index: -1;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div class="glow" style="top: -100px; right: -100px;"></div>
    <div class="glow" style="bottom: -100px; left: -100px;"></div>

    <div class="w-full max-w-md">
        <div class="flex flex-col items-center mb-10">
            <div class="w-10 h-10 bg-white rounded-sm rotate-45 mb-4 flex items-center justify-center">
                <i class="ph-fill ph-hexagon text-black -rotate-45 text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tighter text-white">ITS CONSTRUCT</h1>
            <p class="text-neutral-500 text-sm mt-1">Enterprise Industrial Training Portal</p>
        </div>

        <div class="login-card rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-semibold mb-6 text-gradient">Welcome back</h2>

            <form action="#" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-neutral-500 mb-2">Learner ID /
                        Email</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-neutral-500">
                            <i class="ph ph-user"></i>
                        </span>
                        <input type="email" placeholder="thabo.lekota@tshwane.edu.za"
                            class="input-field w-full py-3 pl-11 pr-4 rounded-lg text-sm text-white">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-xs font-bold uppercase tracking-widest text-neutral-500 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-neutral-500">
                            <i class="ph ph-lock"></i>
                        </span>
                        <input type="password" placeholder="••••••••"
                            class="input-field w-full py-3 pl-11 pr-4 rounded-lg text-sm text-white">
                    </div>
                </div>

                <div class="flex items-center justify-between py-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox"
                            class="rounded border-neutral-800 bg-neutral-900 text-white focus:ring-0">
                        <span class="text-xs text-neutral-400">Remember session</span>
                    </label>
                    <a href="#" class="text-xs text-neutral-400 hover:text-white transition">Forgot password?</a>
                </div>

                <button type="submit"
                    class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-neutral-200 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    Enter Simulator <i class="ph-bold ph-arrow-right"></i>
                </button>
            </form>
        </div>

        <div class="mt-8 text-center">
            <p class="text-neutral-500 text-xs">
                Not registered yet?
                <a href="#" class="text-white font-medium hover:underline underline-offset-4">Contact your Training
                    Officer</a>
            </p>
            <div class="mt-8 flex justify-center gap-6 opacity-40">
                <span class="text-[10px] font-bold tracking-widest uppercase">ISO-14118</span>
                <span class="text-[10px] font-bold tracking-widest uppercase">QCTO Registered</span>
            </div>
        </div>
    </div>

</body>

</html>
