<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myelin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%) fixed;
            background-color: #050505;
            color: #E5E5E5;
        }

        .glass-nav {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }



        .text-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, #A3A3A3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        .group:hover .flip-inner {
            transform: rotateY(180deg);
        }
    </style>
</head>

<body>

    <nav class="fixed w-full z-50 glass-nav px-8 py-4 flex justify-between items-center">
        <div class="hidden md:flex gap-8 text-sm font-medium text-neutral-400">
            <a href="#" class="hover:text-white transition">Simulator</a>
            <a href="#" class="hover:text-white transition">Curriculum</a>
            <a href="#" class="hover:text-white transition">LMS Integration</a>
        </div>
        <button onclick="openDemoModal()"
            class="bg-white text-black px-5 py-2 rounded-full text-sm font-bold hover:bg-neutral-200 transition">
            Request Demo
        </button>
    </nav>

    <section class="relative min-h-screen flex flex-col items-center justify-center pt-20 pb-20 overflow-hidden">
        <div class="z-10 text-center max-w-4xl px-6">
            <span
                class="inline-block border border-neutral-800 rounded-full px-4 py-1 text-xs font-semibold tracking-widest text-neutral-500 mb-6 uppercase">
                AI-Driven Simulation Training for Trades
            </span>
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter text-gradient mb-8">
                <span class="block text-8xl md:text-[9rem] leading-none mb-4">Myelin</span>
                Simulation Training System
            </h1>

            <button
                class="group relative px-8 py-4 font-bold text-white rounded-full bg-neutral-900/80 border border-neutral-700 backdrop-blur-sm hover:border-white transition-all overflow-hidden shadow-2xl mt-4">
                <div
                    class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
                </div>
                <span class="relative z-10 flex items-center justify-center gap-3 text-sm tracking-widest uppercase">
                    Learn More
                </span>
            </button>
        </div>
    </section>

    <!-- Request Demo Modal -->
    <div id="demoModal" class="fixed inset-0 z-[100] hidden items-center justify-center">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeDemoModal()"></div>

        <!-- Modal Content -->
        <div class="relative w-full max-w-lg p-8 rounded-2xl bg-[#0a0a0a] border border-neutral-800 shadow-2xl transform scale-95 opacity-0 transition-all duration-300"
            id="demoModalContent">

            <button onclick="closeDemoModal()"
                class="absolute top-4 right-4 text-neutral-500 hover:text-white transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <h2 class="text-3xl font-bold tracking-tighter mb-2 text-white">Request a Demo</h2>
            <p class="text-neutral-400 text-sm mb-6">See how Myelin can transform your training programs.</p>

            <form class="space-y-4" onsubmit="event.preventDefault(); closeDemoModal();">
                <div>
                    <label class="block text-xs font-medium text-neutral-500 mb-1 uppercase tracking-wider">Work
                        Email</label>
                    <input type="email" placeholder="john@company.com" required
                        class="w-full bg-[#111] border border-neutral-800 rounded-lg px-4 py-3 text-white placeholder-neutral-600 focus:outline-none focus:border-neutral-500 focus:ring-1 focus:ring-neutral-500 transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-neutral-500 mb-1 uppercase tracking-wider">First
                            Name</label>
                        <input type="text" placeholder="John" required
                            class="w-full bg-[#111] border border-neutral-800 rounded-lg px-4 py-3 text-white placeholder-neutral-600 focus:outline-none focus:border-neutral-500 focus:ring-1 focus:ring-neutral-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-neutral-500 mb-1 uppercase tracking-wider">Last
                            Name</label>
                        <input type="text" placeholder="Doe" required
                            class="w-full bg-[#111] border border-neutral-800 rounded-lg px-4 py-3 text-white placeholder-neutral-600 focus:outline-none focus:border-neutral-500 focus:ring-1 focus:ring-neutral-500 transition">
                    </div>
                </div>
                <div>
                    <label
                        class="block text-xs font-medium text-neutral-500 mb-1 uppercase tracking-wider">Company</label>
                    <input type="text" placeholder="Company Name" required
                        class="w-full bg-[#111] border border-neutral-800 rounded-lg px-4 py-3 text-white placeholder-neutral-600 focus:outline-none focus:border-neutral-500 focus:ring-1 focus:ring-neutral-500 transition">
                </div>
                <button type="submit"
                    class="w-full bg-white text-black font-bold py-3 px-4 rounded-lg hover:bg-neutral-200 transition mt-2">
                    Submit Request
                </button>
            </form>
        </div>
    </div>

    <script>
        function openDemoModal() {
            const modal = document.getElementById('demoModal');
            const content = document.getElementById('demoModalContent');

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            // Trigger animation
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeDemoModal() {
            const modal = document.getElementById('demoModal');
            const content = document.getElementById('demoModalContent');

            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');

            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300); // Wait for transition
        }
    </script>
</body>

</html>
